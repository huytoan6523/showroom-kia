<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tin tức — Showroom KIA</title>
  <meta name="description" content="Đọc tin tức mới nhất về các dòng xe KIA, ưu đãi và dịch vụ tại showroom.">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="page-top">

  <!-- ═══ NAVBAR ═══ -->
  <nav id="navbar">
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="nav-logo">KIA</a>
        <div id="nav-menu">
          <a href="/" class="nav-link">Trang chủ</a>
          <a href="/san-pham" class="nav-link">Sản phẩm</a>
          <a href="/tin-tuc" class="nav-link">Tin tức</a>
          <a href="/lien-he" class="nav-link">Liên hệ</a>
          <a href="/dat-lich" class="nav-cta">Đặt lịch lái thử</a>
        </div>
        <button id="nav-toggle" aria-label="Mở menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══ CONTENT ═══ -->
  <section class="section">
    <div class="container">
      <div id="article-content"></div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer id="footer"></footer>

  <script src="/js/main.js"></script>
  <script>
    initNav();
    loadFooter();

    (async function init() {
      const el = document.getElementById('article-content');
      el.innerHTML = spinnerHTML();

      const slug = window.location.pathname.split('/').pop();
      if (!slug) {
        el.innerHTML = `<a href="/tin-tuc" class="back-link">← Quay lại tin tức</a>${emptyHTML('Không tìm thấy bài viết.')}`;
        return;
      }

      const articleRes = await apiFetch('/tin-tuc/slug/' + slug);
      const article = (articleRes && articleRes.data) ? articleRes.data : articleRes;

      if (!article || !article.id) {
        el.innerHTML = `<a href="/tin-tuc" class="back-link">← Quay lại tin tức</a>${emptyHTML('Không thể tải bài viết.')}`
        return;
      }

      document.title = article.tieu_de + ' — Showroom KIA';
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', article.tom_tat ? article.tom_tat.substring(0, 160) : article.tieu_de);

      const coverHTML = article.anh_dai_dien
        ? `<img src="${imgSrc(article.anh_dai_dien)}" alt="${article.tieu_de}" class="article-cover"
             onerror="this.style.display='none'">`
        : '';

      el.innerHTML = `
        <div class="breadcrumb">
          <a href="/">Trang chủ</a>
          <span>/</span>
          <a href="/tin-tuc">Tin tức</a>
          <span>/</span>
          <span>${article.tieu_de}</span>
        </div>
        <div class="article-wrap reveal">
          ${coverHTML}
          ${article.danh_muc ? `<span class="card-badge" style="display:inline-block;margin-bottom:12px">${article.danh_muc}</span>` : ''}
          <div class="article-meta">
            <span>KIA Showroom</span>
            <span class="sep">•</span>
            <span>${formatDate(article.created_at)}</span>
          </div>
          <h1 class="article-title">${article.tieu_de}</h1>
          ${article.tom_tat ? `<p class="article-summary">${article.tom_tat}</p>` : ''}
          <div class="article-body rich-text-content">
            ${article.noi_dung || '<p>Nội dung đang được cập nhật.</p>'}
          </div>
          <div style="margin-top:40px;padding-top:32px;border-top:1px solid var(--gray-line);display:flex;gap:12px;flex-wrap:wrap">
            <a href="/dat-lich" class="btn btn-primary">Đặt lịch lái thử</a>
            <a href="/tin-tuc"  class="btn btn-outline-dark">Xem tin tức khác</a>
          </div>
        </div>`;

      initScrollReveal();
    })();
  </script>
</body>

</html>
