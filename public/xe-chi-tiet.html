<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết xe — Showroom KIA</title>
  <meta name="description" content="Khám phá chi tiết, thông số kỹ thuật và giá xe KIA chính hãng.">
  <link rel="stylesheet" href="/css/style.css?v=2">
</head>

<body class="page-top">

  <!-- ═══ NAVBAR ═══ -->
  <nav id="navbar">
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="nav-logo">KIA</a>
        <div id="nav-menu">
          <a href="/" class="nav-link">Trang chủ</a>
          <a href="/san-pham" class="nav-link">Sản phẩm</a>
          <a href="/tin-tuc" class="nav-link">Tin tức</a>
          <a href="/lien-he" class="nav-link">Liên hệ</a>
          <a href="/dat-lich" class="nav-cta">Báo giá lăn bánh</a>
        </div>
        <button id="nav-toggle" aria-label="Mở menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══ CONTENT ═══ -->
  <section class="section">
    <div class="container">
      <div id="car-detail"></div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer id="footer"></footer>

  <script src="/js/main.js"></script>
  <script>
    initNav();
    loadFooter();

    (async function init() {
      const el = document.getElementById('car-detail');
      el.innerHTML = spinnerHTML();

      const slug = window.location.pathname.split('/').pop();
      if (!slug) {
        el.innerHTML = `<a href="/san-pham" class="back-link">← Quay lại</a>${emptyHTML('Không tìm thấy xe.')}`;
        return;
      }

      const xeRes = await apiFetch('/xe/slug/' + slug);
      const xe = (xeRes && xeRes.data) ? xeRes.data : xeRes;

      if (!xe || !xe.id) {
        el.innerHTML = `<a href="/san-pham" class="back-link">← Quay lại</a>${emptyHTML('Không thể tải thông tin xe.')}`;
        return;
      }

      document.title = xe.ten_xe + ' — Showroom KIA';
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', xe.mo_ta ? xe.mo_ta.substring(0, 160) : 'Chi tiết xe ' + xe.ten_xe);

      /* ── Images ── */
      const images = [];
      if (xe.anh_dai_dien) images.push(xe.anh_dai_dien);
      (xe.AnhXes || []).sort((a, b) => a.thu_tu - b.thu_tu).forEach(a => {
        if (a.url_anh && !images.includes(a.url_anh)) images.push(a.url_anh);
      });

      const mainImgSrc = images.length ? imgSrc(images[0]) : imgSrc(null);

      const thumbsHTML = images.length > 1
        ? `<div class="car-thumb-row">
            ${images.map((src, i) => `
              <img src="${imgSrc(src)}" alt="Ảnh ${i + 1}"
                class="car-thumb${i === 0 ? ' active' : ''}"
                onclick="switchImg(this, '${imgSrc(src)}')"
                onerror="this.style.display='none'">`).join('')}
           </div>`
        : '';

      /* ── Versions ── */
      const versions = xe.PhienBans || [];
      const priceText = formatPriceRange(versions);

      const versionsHTML = versions.length
        ? `<div class="versions-section">
            <h4>Phiên bản &amp; giá</h4>
            <div class="versions-list">
              ${versions.map(v => `
                <div class="version-row">
                  <span class="version-name">${v.ten_phien_ban}</span>
                  <span class="version-price">${formatMoney(v.gia)}</span>
                </div>`).join('')}
            </div>
           </div>`
        : '';

      /* ── Description (Supports HTML) ── */
      const descHTML = xe.mo_ta
        ? `<section class="desc-section reveal">
            <h3 style="margin-bottom:24px">Chi tiết sản phẩm</h3>
            <div class="rich-text-content">${xe.mo_ta}</div>
           </section>`
        : '';

      /* ── Render ── */
      el.innerHTML = `
        <div class="breadcrumb">
          <a href="/">Trang chủ</a>
          <span>/</span>
          <a href="/san-pham">Sản phẩm</a>
          <span>/</span>
          <span>${xe.ten_xe}</span>
        </div>

        <!-- TOP: image + info -->
        <div class="car-detail-layout reveal">

          <!-- Left: images -->
          <div>
            <img id="car-main-img" src="${mainImgSrc}" alt="${xe.ten_xe}"
              class="car-main-img" onerror="this.style.display='none'">
            ${thumbsHTML}
          </div>

          <!-- Right: title + price + versions + CTA -->
          <div class="car-info">
            <h1>${xe.ten_xe}</h1>
            
            ${xe.mo_ta_ngan ? `<div class="car-short-desc">${xe.mo_ta_ngan}</div>` : ''}

            ${xe.giam_gia_max ? `
            <div class="car-price-block">
              <div class="car-promo">
                <span class="promo-tag">Ưu đãi</span>
                Ưu đãi lên đến <strong>${formatMoney(xe.giam_gia_max)}</strong>
              </div>
            </div>` : ''}

            ${versionsHTML}

            <div class="car-actions">
              <a href="/dat-lich?xe=${encodeURIComponent(xe.ten_xe)}"
                class="btn btn-primary">Đặt lịch lái thử</a>
              <a href="/lien-he" class="btn btn-outline-dark">Liên hệ tư vấn</a>
            </div>
          </div>
        </div>

        <!-- BOTTOM: description -->
        ${descHTML ? `<div class="car-below">${descHTML}</div>` : ''}
      `;

      initScrollReveal();
    })();

    function switchImg(thumb, src) {
      const main = document.getElementById('car-main-img');
      if (main) { main.src = src; main.style.display = ''; }
      document.querySelectorAll('.car-thumb').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
    }
  </script>
</body>

</html>
